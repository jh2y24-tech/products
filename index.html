<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
<title>형제상사 · 제품 검색 안내</title>

<link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css" />
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@500;600;700&display=swap" rel="stylesheet" />

<style>
:root{
  --brand:#004750; --brand-2:#00343B; --brand-3:#1E6069;
  --brand-tint:#E2EDEC; --brand-tint2:#D2E3E2;
  --ink:#10262A; --ink-soft:#56686B; --paper:#F0F3F2; --surface:#FFFFFF; --line:#D7E0DE;
  --signal:#D97A16; --signal-ink:#7A4106; --signal-bg:#FBEBD3; --signal-bd:#F0CE9B;
  --warn-bg:#FDF3E7; --warn-bd:#F0D3AC;
  --focus:#1573E6;
  --r-lg:22px; --r-md:16px; --r-sm:11px;
  --shadow-card:0 1px 2px rgba(0,71,80,.05),0 8px 24px rgba(0,71,80,.07);
  --shadow-pop:0 24px 70px rgba(0,40,45,.30);
  --mono:"IBM Plex Mono",ui-monospace,monospace;
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html,body{height:100%}
body{font-family:"Pretendard Variable",Pretendard,system-ui,sans-serif;color:var(--ink);background:var(--paper);line-height:1.5;-webkit-font-smoothing:antialiased}

.top{position:sticky;top:0;z-index:20;background:rgba(240,243,242,.9);backdrop-filter:saturate(1.2) blur(10px);border-bottom:1px solid var(--line)}
.top-inner{max-width:1200px;margin:0 auto;padding:18px clamp(16px,4vw,40px)}
.brand{display:flex;align-items:center;gap:14px;margin-bottom:18px}
.brand img{height:clamp(30px,4.4vw,42px);width:auto;display:block}
.brand .divider{width:1px;height:26px;background:var(--line)}
.brand .sub{font-size:clamp(14px,1.9vw,17px);font-weight:600;color:var(--brand);letter-spacing:-.01em}

.search{position:relative;display:flex;align-items:center;background:var(--surface);border:2px solid var(--line);border-radius:var(--r-lg);box-shadow:var(--shadow-card);transition:border-color .16s}
.search:focus-within{border-color:var(--brand)}
.search svg{width:26px;height:26px;margin-left:20px;flex:none;color:var(--brand-3)}
.search input{flex:1;border:0;outline:0;background:transparent;font-size:clamp(18px,2.2vw,22px);font-weight:500;padding:20px 16px;color:var(--ink);min-width:0}
.search input::placeholder{color:#94A2A1}
.search .clear{display:none;border:0;background:var(--brand-tint);color:var(--brand);width:38px;height:38px;border-radius:50%;margin-right:12px;font-size:20px;cursor:pointer;flex:none}
.search.has-value .clear{display:grid;place-items:center}

.chips{display:flex;gap:9px;overflow-x:auto;padding:16px 2px 2px;scrollbar-width:none}
.chips::-webkit-scrollbar{display:none}
.chip{flex:none;border:1.5px solid var(--line);background:var(--surface);color:var(--ink-soft);font-size:15px;font-weight:600;padding:10px 18px;border-radius:999px;cursor:pointer;transition:all .14s;white-space:nowrap}
.chip[aria-pressed="true"]{background:var(--brand);color:#fff;border-color:var(--brand)}

.wrap{max-width:1200px;margin:0 auto;padding:22px clamp(16px,4vw,40px) 80px}
.count{font-family:var(--mono);font-size:13px;color:var(--ink-soft);margin-bottom:16px;font-weight:600;letter-spacing:.02em}

.grid{display:grid;gap:16px;grid-template-columns:repeat(auto-fill,minmax(240px,1fr))}
.card{text-align:left;background:var(--surface);border:1px solid var(--line);border-radius:var(--r-md);overflow:hidden;cursor:pointer;box-shadow:var(--shadow-card);transition:transform .16s,box-shadow .16s;display:flex;flex-direction:column}
.card:hover{transform:translateY(-3px);box-shadow:var(--shadow-pop)}
.card:focus-visible{outline:3px solid var(--focus);outline-offset:2px}
.card .thumb{aspect-ratio:4/3;width:100%;object-fit:cover;background:var(--brand-tint);display:block}
.card .body{padding:15px 16px 17px;display:flex;flex-direction:column;gap:6px;flex:1}
.card .cat{font-size:12px;font-weight:700;color:var(--brand);letter-spacing:.02em}
.card .name{font-size:18px;font-weight:700;letter-spacing:-.01em;line-height:1.3}
.card .loc-mini{margin-top:auto;display:inline-flex;align-items:center;gap:7px;font-family:var(--mono);font-weight:700;font-size:14px;color:var(--signal-ink)}
.card .loc-mini b{background:var(--signal-bg);color:var(--signal-ink);padding:3px 9px;border-radius:7px;font-size:15px;letter-spacing:.03em}

.empty{text-align:center;padding:70px 20px;color:var(--ink-soft)}
.empty .bars{display:flex;gap:6px;justify-content:center;align-items:flex-end;height:44px;margin-bottom:20px;opacity:.35}
.empty .bars i{width:11px;background:var(--brand);border-radius:2px 2px 0 0;display:block}
.empty .big{font-size:22px;font-weight:700;color:var(--ink);margin-bottom:8px}

.overlay{position:fixed;inset:0;z-index:50;display:none;background:rgba(6,24,27,.55);backdrop-filter:blur(3px);align-items:flex-end;justify-content:center}
.overlay.open{display:flex}
.detail{background:var(--surface);width:100%;max-width:880px;max-height:94vh;overflow-y:auto;border-radius:var(--r-lg) var(--r-lg) 0 0;box-shadow:var(--shadow-pop);animation:slideUp .26s cubic-bezier(.16,1,.3,1)}
@keyframes slideUp{from{transform:translateY(40px);opacity:0}to{transform:none;opacity:1}}
.detail-head{position:sticky;top:0;background:var(--surface);z-index:2;display:flex;justify-content:flex-end;padding:14px 14px 0}
.detail-close{border:0;background:var(--brand-tint);width:46px;height:46px;border-radius:50%;font-size:24px;color:var(--brand);cursor:pointer;line-height:1}
.detail-close:focus-visible{outline:3px solid var(--focus);outline-offset:2px}
.detail-body{padding:4px clamp(20px,4vw,40px) 40px}
.detail img.hero{width:100%;aspect-ratio:16/10;object-fit:cover;background:var(--brand-tint);border-radius:var(--r-md);margin-bottom:22px;cursor:zoom-in}
.detail .d-cat{font-size:14px;font-weight:700;color:var(--brand)}
.detail .d-name{font-size:clamp(24px,4vw,34px);font-weight:800;letter-spacing:-.02em;margin:4px 0 22px}

.placard{display:flex;align-items:center;gap:20px;background:linear-gradient(135deg,#FFF7EC,var(--signal-bg));border:2px solid var(--signal-bd);border-radius:var(--r-md);padding:20px 24px;margin-bottom:26px}
.placard .label{font-size:14px;font-weight:700;color:var(--signal-ink)}
.placard .no{font-family:var(--mono);font-weight:700;font-size:clamp(38px,9vw,60px);color:var(--signal);line-height:1;letter-spacing:.01em;margin-top:2px}
.placard .note{font-size:14px;font-weight:600;color:var(--signal-ink);margin-top:4px}
.placard .pin{margin-left:auto;width:56px;height:56px;color:var(--signal);flex:none}

.specs{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:26px}
.pdf-btn{display:flex;align-items:center;gap:12px;width:100%;text-decoration:none;background:var(--brand);color:#fff;border-radius:var(--r-md);padding:16px 20px;font-size:16px;font-weight:700;margin-bottom:26px;transition:background .15s}
.pdf-btn:hover{background:var(--brand-2)}
.pdf-btn svg{width:24px;height:24px;flex:none}
.pdf-btn .arw{margin-left:auto;opacity:.8}
.spec{background:var(--brand-tint);border:1px solid var(--line);border-radius:var(--r-sm);padding:16px 18px}
.spec .k{font-size:13px;font-weight:700;color:var(--brand-3);margin-bottom:6px}
.spec .v{font-family:var(--mono);font-size:20px;font-weight:700;color:var(--ink)}

.sec{margin-bottom:26px}
.sec>h3{font-size:15px;font-weight:800;margin-bottom:12px;color:var(--brand);display:flex;align-items:center;gap:8px}
.sec>h3::before{content:"";width:4px;height:15px;background:var(--brand);border-radius:2px;display:inline-block}
.desc-p{color:#2C3B3D;font-size:16px;line-height:1.65}
.uses-box{background:var(--brand-tint);border:1px solid var(--brand-tint2);border-radius:var(--r-md);padding:16px 18px;color:#22383B;font-size:15px;line-height:1.6}

.method{border:1px solid var(--line);border-radius:var(--r-md);overflow:hidden;margin-bottom:12px;background:var(--surface)}
.method>summary{list-style:none;cursor:pointer;padding:16px 18px;font-weight:700;font-size:16px;color:var(--ink);display:flex;align-items:center;justify-content:space-between;background:var(--brand-tint)}
.method>summary::-webkit-details-marker{display:none}
.method>summary .arw{transition:transform .2s;color:var(--brand-3)}
.method[open]>summary .arw{transform:rotate(90deg)}
.method ol{list-style:none;counter-reset:s;padding:8px 18px 16px}
.method ol li{counter-increment:s;position:relative;padding:10px 0 10px 42px;font-size:15px;line-height:1.55;color:#2C3B3D;border-top:1px solid var(--line)}
.method ol li:first-child{border-top:0}
.method ol li::before{content:counter(s);position:absolute;left:0;top:9px;width:28px;height:28px;background:var(--brand);color:#fff;border-radius:8px;font-family:var(--mono);font-weight:700;font-size:14px;display:grid;place-items:center}

.cautions{background:var(--warn-bg);border:1px solid var(--warn-bd);border-radius:var(--r-md);padding:14px 18px}
.cautions li{list-style:none;position:relative;padding:7px 0 7px 24px;font-size:14.5px;line-height:1.5;color:#5A4321}
.cautions li::before{content:"!";position:absolute;left:0;top:7px;width:17px;height:17px;background:var(--signal);color:#fff;border-radius:50%;font-size:12px;font-weight:700;display:grid;place-items:center}

.gallery{display:grid;gap:14px}
.gallery figure{border:1px solid var(--line);border-radius:var(--r-md);overflow:hidden;background:var(--surface)}
.gallery img{width:100%;display:block;background:#fff;cursor:zoom-in}
.gallery figcaption{font-size:13px;color:var(--ink-soft);padding:10px 14px;font-weight:600}

.lightbox{position:fixed;inset:0;z-index:80;display:none;background:rgba(4,18,20,.92);align-items:center;justify-content:center;padding:24px;cursor:zoom-out}
.lightbox.open{display:flex}
.lightbox img{max-width:100%;max-height:100%;border-radius:8px}

@media (max-width:560px){.specs{grid-template-columns:1fr}}
@media (min-width:760px){.overlay{align-items:center;padding:24px}.detail{border-radius:var(--r-lg)}.gallery{grid-template-columns:1fr 1fr}}
@media (prefers-reduced-motion:reduce){*{animation:none!important;transition:none!important}}
</style>
</head>

    "desc": "저점도 시아노아크릴레이트. 플라스틱, 고무, 소형 부품 순간 고정에 적합합니다.",
    "image": ""
  },
  {
    "name": "UV 경화 레진 UR-90",
    "category": "레진",
    "usage": "두께 2mm 이하 권장",
    "curing": "UV 60초",
    "location": "B-07",
    "desc": "자외선 램프로 빠르게 굳는 투명 코팅용 레진. 액세서리·표면 코팅에 사용합니다.",
    "image": ""
  },
  {
    "name": "실리콘 실란트 SL-15",
    "category": "실란트",
    "usage": "길이 10m당 1개",
    "curing": "표면 20분 / 완전 24시간",
    "location": "C-02",
    "desc": "방수·방습 중성 실리콘 실란트. 주방, 욕실, 창호 마감에 적합합니다.",
    "image": ""
  }
];
/* ===================== 데이터 끝 ===================== */

function esc(s){return String(s).replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;");}
function placeholder(cat){
  var svg="<svg xmlns='http://www.w3.org/2000/svg' width='400' height='300'>"+
    "<rect width='400' height='300' fill='#E2EDEC'/>"+
    "<g fill='#004750' opacity='.85'>"+
    "<rect x='150' y='150' width='20' height='95'/><rect x='178' y='120' width='20' height='125'/>"+
    "<rect x='206' y='165' width='20' height='80'/><rect x='234' y='135' width='20' height='110'/></g>"+
    "<text x='50%' y='280' font-family='sans-serif' font-size='15' fill='#1E6069' text-anchor='middle'>"+cat+" · 사진 준비중</text></svg>";
  return "data:image/svg+xml;utf8,"+encodeURIComponent(svg);
}
var imgOf=function(p){return p.image&&p.image.trim()?p.image:placeholder(p.category);};

var activeCat="전체",query="";
var grid=document.getElementById("grid"),count=document.getElementById("count"),chips=document.getElementById("chips"),input=document.getElementById("q");

var cats=["전체"];PRODUCTS.forEach(function(p){if(cats.indexOf(p.category)<0)cats.push(p.category);});
cats.forEach(function(c){var b=document.createElement("button");b.className="chip";b.textContent=c;b.setAttribute("aria-pressed",c===activeCat);b.onclick=function(){activeCat=c;syncChips();render();};chips.appendChild(b);});
function syncChips(){Array.prototype.forEach.call(chips.children,function(b){b.setAttribute("aria-pressed",b.textContent===activeCat);});}

function filtered(){var q=query.trim().toLowerCase();return PRODUCTS.filter(function(p){var catOk=activeCat==="전체"||p.category===activeCat;if(!q)return catOk;var hay=(p.name+" "+p.category+" "+p.usage+" "+p.location+" "+(p.desc||"")+" "+(p.uses||"")).toLowerCase();return catOk&&hay.indexOf(q)>-1;});}

function render(){
  var list=filtered();count.textContent="제품 "+list.length+"개";
  if(list.length===0){grid.innerHTML="<div class='empty' style='grid-column:1/-1'><div class='bars'><i style='height:24px'></i><i style='height:40px'></i><i style='height:16px'></i><i style='height:32px'></i></div><div class='big'>검색 결과가 없습니다</div><div>다른 제품명이나 위치번호로 다시 검색해 보세요.</div></div>";return;}
  grid.innerHTML="";
  list.forEach(function(p){
    var card=document.createElement("button");card.className="card";
    card.innerHTML="<img class='thumb' src='"+imgOf(p)+"' alt='"+esc(p.name)+"' loading='lazy'><div class='body'><span class='cat'>"+esc(p.category)+"</span><span class='name'>"+esc(p.name)+"</span><span class='loc-mini'>위치 <b>"+esc(p.location)+"</b></span></div>";
    card.onclick=function(){openDetail(p);};grid.appendChild(card);
  });
}

var overlay=document.getElementById("overlay"),detailBody=document.getElementById("detailBody"),lastFocused=null;
function openDetail(p){
  lastFocused=document.activeElement;
  var h="<img class='hero zoom' src='"+imgOf(p)+"' alt='"+esc(p.name)+"'>";
  h+="<div class='d-cat'>"+esc(p.category)+"</div><div class='d-name'>"+esc(p.name)+"</div>";
  h+="<div class='placard'><div><div class='label'>매장 위치</div><div class='no'>"+esc(p.location)+"</div>"+(p.locationNote?"<div class='note'>"+esc(p.locationNote)+"</div>":"")+"</div><svg class='pin' viewBox='0 0 24 24' fill='currentColor'><path d='M12 2C8.1 2 5 5.1 5 9c0 5.2 7 13 7 13s7-7.8 7-13c0-3.9-3.1-7-7-7zm0 9.5A2.5 2.5 0 1 1 12 6.5a2.5 2.5 0 0 1 0 5z'/></svg></div>";
  h+="<div class='specs'><div class='spec'><div class='k'>사용량</div><div class='v'>"+esc(p.usage)+"</div></div><div class='spec'><div class='k'>경화시간</div><div class='v'>"+esc(p.curing)+"</div></div></div>";
  if(p.catalog){h+="<a class='pdf-btn' href='"+p.catalog+"' target='_blank' rel='noopener'><svg viewBox='0 0 24 24' fill='none' stroke='currentColor' stroke-width='2' stroke-linecap='round' stroke-linejoin='round'><path d='M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z'/><path d='M14 2v6h6'/></svg>제품 안내서(PDF) 보기<span class='arw'>→</span></a>";}
  if(p.desc){h+="<div class='sec'><h3>제품 설명</h3><p class='desc-p'>"+esc(p.desc)+"</p></div>";}
  if(p.uses){h+="<div class='sec'><h3>용도</h3><div class='uses-box'>"+esc(p.uses)+"</div></div>";}
  if(p.methods&&p.methods.length){
    h+="<div class='sec'><h3>시공법</h3>";
    p.methods.forEach(function(m,i){
      h+="<details class='method'"+(i===0?" open":"")+"><summary>"+esc(m.title)+"<span class='arw'>▸</span></summary><ol>";
      m.steps.forEach(function(s){h+="<li>"+esc(s)+"</li>";});
      h+="</ol></details>";
    });
    h+="</div>";
  }
  if(p.cautions&&p.cautions.length){
    h+="<div class='sec'><h3>주의사항</h3><ul class='cautions'>";
    p.cautions.forEach(function(c){h+="<li>"+esc(c)+"</li>";});
    h+="</ul></div>";
  }
  if(p.gallery&&p.gallery.length){
    h+="<div class='sec'><h3>시공 단면도</h3><div class='gallery'>";
    p.gallery.forEach(function(g){h+="<figure><img class='zoom' src='"+g.src+"' alt='"+esc(g.cap||"")+"'><figcaption>"+esc(g.cap||"")+"</figcaption></figure>";});
    h+="</div></div>";
  }
  detailBody.innerHTML=h;
  detailBody.parentNode.scrollTop=0;
  overlay.classList.add("open");document.body.style.overflow="hidden";document.getElementById("close").focus();
}
function closeDetail(){overlay.classList.remove("open");document.body.style.overflow="";if(lastFocused)lastFocused.focus();}
document.getElementById("close").onclick=closeDetail;
overlay.onclick=function(e){if(e.target===overlay)closeDetail();};

/* 이미지 확대(라이트박스) */
var lightbox=document.getElementById("lightbox"),lightboxImg=document.getElementById("lightboxImg");
detailBody.addEventListener("click",function(e){var t=e.target;if(t.tagName==="IMG"&&t.classList.contains("zoom")){lightboxImg.src=t.src;lightbox.classList.add("open");}});
lightbox.onclick=function(){lightbox.classList.remove("open");lightboxImg.src="";};

document.addEventListener("keydown",function(e){if(e.key==="Escape"){if(lightbox.classList.contains("open")){lightbox.classList.remove("open");}else{closeDetail();}}});

var box=document.getElementById("searchBox");
input.addEventListener("input",function(e){query=e.target.value;box.classList.toggle("has-value",query.length>0);render();});
document.getElementById("clear").onclick=function(){query="";input.value="";box.classList.remove("has-value");input.focus();render();};

render();
</script>
</body>
</html>
