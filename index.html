<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
<title>형제상사 · 제품 검색 안내</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css" />
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@500;600;700&display=swap" rel="stylesheet" />
<style>
:root{
  --brand:#004750;--brand-2:#00343B;--brand-3:#1E6069;--brand-tint:#E2EDEC;--brand-tint2:#D2E3E2;
  --ink:#10262A;--ink-soft:#56686B;--paper:#F0F3F2;--surface:#FFFFFF;--line:#D7E0DE;
  --signal:#D97A16;--signal-ink:#7A4106;--signal-bg:#FBEBD3;--signal-bd:#F0CE9B;
  --warn-bg:#FDF3E7;--warn-bd:#F0D3AC;--focus:#1573E6;
  --r-lg:22px;--r-md:16px;--r-sm:11px;
  --shadow-card:0 1px 2px rgba(0,71,80,.05),0 8px 24px rgba(0,71,80,.07);
  --shadow-pop:0 24px 70px rgba(0,40,45,.30);--mono:"IBM Plex Mono",ui-monospace,monospace;
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html,body{height:100%}
body{font-family:"Pretendard Variable",Pretendard,system-ui,sans-serif;color:var(--ink);background:var(--paper);line-height:1.5;-webkit-font-smoothing:antialiased}
.top{position:sticky;top:0;z-index:20;background:rgba(240,243,242,.9);backdrop-filter:saturate(1.2) blur(10px);border-bottom:1px solid var(--line)}
.top-inner{max-width:1200px;margin:0 auto;padding:18px clamp(16px,4vw,40px)}
.brand{display:flex;align-items:center;gap:14px;margin-bottom:18px}
.brand img{height:clamp(30px,4.4vw,42px);width:auto;display:block}
.brand .divider{width:1px;height:26px;background:var(--line)}
.brand .sub{font-size:clamp(14px,1.9vw,17px);font-weight:600;color:var(--brand);letter-spacing:-.01em}
.search{position:relative;display:flex;align-items:center;background:var(--surface);border:2px solid var(--line);border-radius:var(--r-lg);box-shadow:var(--shadow-card);transition:border-color .16s}
.search:focus-within{border-color:var(--brand)}
.search svg{width:26px;height:26px;margin-left:20px;flex:none;color:var(--brand-3)}
.search input{flex:1;border:0;outline:0;background:transparent;font-size:clamp(18px,2.2vw,22px);font-weight:500;padding:20px 16px;color:var(--ink);min-width:0}
.search input::placeholder{color:#94A2A1}
.search .clear{display:none;border:0;background:var(--brand-tint);color:var(--brand);width:38px;height:38px;border-radius:50%;margin-right:12px;font-size:20px;cursor:pointer;flex:none}
.search.has-value .clear{display:grid;place-items:center}
.chips{display:flex;gap:9px;overflow-x:auto;padding:16px 2px 2px;scrollbar-width:none}
.chips::-webkit-scrollbar{display:none}
.chip{flex:none;border:1.5px solid var(--line);background:var(--surface);color:var(--ink-soft);font-size:15px;font-weight:600;padding:10px 18px;border-radius:999px;cursor:pointer;transition:all .14s;white-space:nowrap}
.chip[aria-pressed="true"]{background:var(--brand);color:#fff;border-color:var(--brand)}
.wrap{max-width:1200px;margin:0 auto;padding:22px clamp(16px,4vw,40px) 80px}
.count{font-family:var(--mono);font-size:13px;color:var(--ink-soft);margin-bottom:16px;font-weight:600;letter-spacing:.02em}
.grid{display:grid;gap:16px;grid-template-columns:repeat(auto-fill,minmax(240px,1fr))}
.card{text-align:left;background:var(--surface);border:1px solid var(--line);border-radius:var(--r-md);overflow:hidden;cursor:pointer;box-shadow:var(--shadow-card);transition:transform .16s,box-shadow .16s;display:flex;flex-direction:column}
.card:hover{transform:translateY(-3px);box-shadow:var(--shadow-pop)}
.card:focus-visible{outline:3px solid var(--focus);outline-offset:2px}
.card .thumb{aspect-ratio:4/3;width:100%;object-fit:cover;background:var(--brand-tint);display:block}
.card .body{padding:15px 16px 17px;display:flex;flex-direction:column;gap:6px;flex:1}
.card .cat{font-size:12px;font-weight:700;color:var(--brand);letter-spacing:.02em}
.card .name{font-size:18px;font-weight:700;letter-spacing:-.01em;line-height:1.3}
.card .loc-mini{margin-top:auto;display:inline-flex;align-items:center;gap:7px;font-family:var(--mono);font-weight:700;font-size:14px;color:var(--signal-ink)}
.card .loc-mini b{background:var(--signal-bg);color:var(--signal-ink);padding:3px 9px;border-radius:7px;font-size:15px;letter-spacing:.03em}
.empty{text-align:center;padding:70px 20px;color:var(--ink-soft)}
.empty .mark{width:72px;height:auto;display:block;margin:0 auto 20px}
.empty .big{font-size:22px;font-weight:700;color:var(--ink);margin-bottom:8px}
.overlay{position:fixed;inset:0;z-index:50;display:none;background:rgba(6,24,27,.55);backdrop-filter:blur(3px);align-items:flex-end;justify-content:center}
.overlay.open{display:flex}
.detail{background:var(--surface);width:100%;max-width:880px;max-height:94vh;overflow-y:auto;border-radius:var(--r-lg) var(--r-lg) 0 0;box-shadow:var(--shadow-pop);animation:slideUp .26s cubic-bezier(.16,1,.3,1)}
@keyframes slideUp{from{transform:translateY(40px);opacity:0}to{transform:none;opacity:1}}
.detail-head{position:sticky;top:0;background:var(--surface);z-index:2;display:flex;justify-content:flex-end;padding:14px 14px 0}
.detail-close{border:0;background:var(--brand-tint);width:46px;height:46px;border-radius:50%;font-size:24px;color:var(--brand);cursor:pointer;line-height:1}
.detail-close:focus-visible{outline:3px solid var(--focus);outline-offset:2px}
.detail-body{padding:4px clamp(20px,4vw,40px) 40px}
.detail img.hero{width:100%;aspect-ratio:16/10;object-fit:cover;background:var(--brand-tint);border-radius:var(--r-md);margin-bottom:22px}
.detail .d-cat{font-size:14px;font-weight:700;color:var(--brand)}
.detail .d-name{font-size:clamp(24px,4vw,34px);font-weight:800;letter-spacing:-.02em;margin:4px 0 22px}
.placard{display:flex;align-items:center;gap:20px;background:linear-gradient(135deg,#FFF7EC,var(--signal-bg));border:2px solid var(--signal-bd);border-radius:var(--r-md);padding:20px 24px;margin-bottom:22px}
.placard.na{background:var(--brand-tint);border-color:var(--brand-tint2)}
.placard .label{font-size:14px;font-weight:700;color:var(--signal-ink)}
.placard.na .label{color:var(--brand-3)}
.placard .no{font-family:var(--mono);font-weight:700;font-size:clamp(30px,7vw,52px);color:var(--signal);line-height:1.05;letter-spacing:.01em;margin-top:2px}
.placard.na .no{color:var(--brand-3);font-size:clamp(22px,5vw,32px)}
.placard .note{font-size:14px;font-weight:600;color:var(--signal-ink);margin-top:4px}
.placard .pin{margin-left:auto;width:52px;height:52px;color:var(--signal);flex:none}
.placard.na .pin{color:var(--brand-3)}
.specs{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:14px}
.spec{background:var(--brand-tint);border:1px solid var(--line);border-radius:var(--r-sm);padding:14px 16px}
.spec .k{font-size:12px;font-weight:700;color:var(--brand-3);margin-bottom:5px}
.spec .v{font-family:var(--mono);font-size:16px;font-weight:700;color:var(--ink);line-height:1.35}
.info{display:flex;flex-wrap:wrap;gap:8px 18px;margin-bottom:22px;padding:2px}
.info div{font-size:13.5px;color:var(--ink-soft)}
.info b{color:var(--ink);font-weight:700}
.pdf-btn{display:flex;align-items:center;gap:12px;width:100%;border:0;cursor:pointer;text-align:left;background:var(--brand);color:#fff;border-radius:var(--r-md);padding:16px 20px;font-size:16px;font-weight:700;margin-bottom:26px;font-family:inherit;transition:background .15s}
.pdf-btn:hover{background:var(--brand-2)}
.pdf-btn svg{width:24px;height:24px;flex:none}
.pdf-btn .arw{margin-left:auto;opacity:.85}
.sec{margin-bottom:26px}
.sec>h3{font-size:15px;font-weight:800;margin-bottom:12px;color:var(--brand);display:flex;align-items:center;gap:8px}
.sec>h3::before{content:"";width:4px;height:15px;background:var(--brand);border-radius:2px;display:inline-block}
.desc-p{color:#2C3B3D;font-size:16px;line-height:1.65}
.uses-box{background:var(--brand-tint);border:1px solid var(--brand-tint2);border-radius:var(--r-md);padding:16px 18px;color:#22383B;font-size:15px;line-height:1.6}
.method{border:1px solid var(--line);border-radius:var(--r-md);overflow:hidden;margin-bottom:12px;background:var(--surface)}
.method>summary{list-style:none;cursor:pointer;padding:15px 18px;font-weight:700;font-size:16px;color:var(--ink);display:flex;align-items:center;justify-content:space-between;background:var(--brand-tint)}
.method>summary::-webkit-details-marker{display:none}
.method>summary .arw{transition:transform .2s;color:var(--brand-3)}
.method[open]>summary .arw{transform:rotate(90deg)}
.method ol{list-style:none;counter-reset:s;padding:8px 18px 12px}
.method ol li{counter-increment:s;position:relative;padding:10px 0 10px 42px;font-size:15px;line-height:1.55;color:#2C3B3D;border-top:1px solid var(--line)}
.method ol li:first-child{border-top:0}
.method ol li::before{content:counter(s);position:absolute;left:0;top:9px;width:28px;height:28px;background:var(--brand);color:#fff;border-radius:8px;font-family:var(--mono);font-weight:700;font-size:14px;display:grid;place-items:center}
.cautions{background:var(--warn-bg);border:1px solid var(--warn-bd);border-radius:var(--r-md);padding:14px 18px}
.cautions li{list-style:none;position:relative;padding:7px 0 7px 24px;font-size:14.5px;line-height:1.5;color:#5A4321}
.cautions li::before{content:"!";position:absolute;left:0;top:7px;width:17px;height:17px;background:var(--signal);color:#fff;border-radius:50%;font-size:12px;font-weight:700;display:grid;place-items:center}
.viewer{position:fixed;inset:0;z-index:70;display:none;background:rgba(4,18,20,.92);flex-direction:column}
.viewer.open{display:flex}
.viewer-head{display:flex;align-items:center;justify-content:space-between;padding:14px 18px;color:#fff;flex:none}
.viewer-head span{font-size:16px;font-weight:700}
.viewer-close{border:0;background:rgba(255,255,255,.15);color:#fff;width:44px;height:44px;border-radius:50%;font-size:24px;cursor:pointer;line-height:1}
.viewer iframe{flex:1;border:0;width:100%;background:#fff}
@media (max-width:560px){.specs{grid-template-columns:1fr}}
@media (min-width:760px){.overlay{align-items:center;padding:24px}.detail{border-radius:var(--r-lg)}}
.to-top{position:fixed;right:18px;bottom:18px;z-index:60;width:54px;height:54px;border-radius:50%;border:0;background:var(--brand);color:#fff;box-shadow:0 6px 20px rgba(0,40,45,.35);cursor:pointer;opacity:0;pointer-events:none;transform:translateY(8px);transition:opacity .2s,transform .2s;display:grid;place-items:center}
.to-top.show{opacity:1;pointer-events:auto;transform:none}
.to-top:hover{background:var(--brand-2)}
.to-top:active{transform:scale(.95)}
.to-top svg{width:26px;height:26px}
.to-top.detail-top{z-index:61}
@media (prefers-reduced-motion:reduce){*{animation:none!important;transition:none!important}}
</style>
</head>

function esc(s){return String(s==null?"":s).replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;");}
function placeholder(cat){
  var svg="<svg xmlns='http://www.w3.org/2000/svg' width='400' height='300'><rect width='400' height='300' fill='#E2EDEC'/>"+
    "<image href='"+MARK+"' x='150' y='98' width='100' height='72'/>"+
    "<text x='50%' y='250' font-family='sans-serif' font-size='15' fill='#1E6069' text-anchor='middle'>"+cat+" · 사진 준비중</text></svg>";
  return "data:image/svg+xml;utf8,"+encodeURIComponent(svg);
}
var imgOf=function(p){return p.image&&p.image.trim()?p.image:placeholder(p.category);};
function imgTag(cls,src,alt,ph){return "<img class='"+cls+"' src='"+src+"' alt='"+esc(alt)+"' loading='lazy' data-ph=\""+ph+"\" onerror=\"this.onerror=null;this.src=this.dataset.ph\">";}

var activeCat="",query="";
var grid=document.getElementById("grid"),count=document.getElementById("count"),chips=document.getElementById("chips"),input=document.getElementById("q");
var cats=["전체"];PRODUCTS.forEach(function(p){if(cats.indexOf(p.category)<0)cats.push(p.category);});
cats.forEach(function(c){var b=document.createElement("button");b.className="chip";b.textContent=c;b.setAttribute("aria-pressed",c===activeCat);b.onclick=function(){activeCat=c;syncChips();render();};chips.appendChild(b);});
function syncChips(){Array.prototype.forEach.call(chips.children,function(b){b.setAttribute("aria-pressed",b.textContent===activeCat);});}
function acted(){return query.trim()!==""||activeCat!=="";}
function filtered(){var q=query.trim().toLowerCase();return PRODUCTS.filter(function(p){var ok=(activeCat===""||activeCat==="전체")?true:p.category===activeCat;if(!q)return ok;var hay=(p.name+" "+p.category+" "+p.usage+" "+p.location+" "+(p.spec||"")+" "+(p.desc||"")+" "+(p.uses||"")+" "+(p.keywords||"")).toLowerCase();return ok&&hay.indexOf(q)>-1;});}

function render(){
  if(!acted()){count.textContent="";grid.innerHTML="<div class='empty' style='grid-column:1/-1'><img class='mark' src='"+MARK+"' alt='형제상사'><div class='big'>찾으시는 제품을 검색하세요</div><div>제품명 · 용도 · 위치번호로 검색하거나, 위에서 분류를 선택하세요.</div></div>";return;}
  var list=filtered();count.textContent="제품 "+list.length+"개";
  if(list.length===0){grid.innerHTML="<div class='empty' style='grid-column:1/-1'><img class='mark' src='"+MARK+"' alt='형제상사'><div class='big'>검색 결과가 없습니다</div><div>다른 제품명이나 위치번호로 다시 검색해 보세요.</div></div>";return;}
  grid.innerHTML="";
  list.forEach(function(p){
    var card=document.createElement("button");card.className="card";
    var locTxt=p.location&&p.location!=="위치 미정"?("위치 <b>"+esc(p.location)+"</b>"):"<b style='background:#E2EDEC;color:#1E6069'>위치 미정</b>";
    card.innerHTML=imgTag("thumb",imgOf(p),p.name,placeholder(p.category))+"<div class='body'><span class='cat'>"+esc(p.category)+"</span><span class='name'>"+esc(p.name)+"</span><span class='loc-mini'>"+locTxt+"</span></div>";
    card.onclick=function(){openDetail(p);};grid.appendChild(card);
  });
}

var overlay=document.getElementById("overlay"),detailBody=document.getElementById("detailBody"),lastFocused=null,currentCatalog=null;
function openDetail(p){
  lastFocused=document.activeElement;currentCatalog=p.catalog||null;
  var ph=placeholder(p.category);
  var h=imgTag("hero",imgOf(p),p.name,ph);
  h+="<div class='d-cat'>"+esc(p.category)+"</div><div class='d-name'>"+esc(p.name)+"</div>";
  var na=(!p.location||p.location==="위치 미정");
  h+="<div class='placard"+(na?" na":"")+"'><div><div class='label'>매장 위치</div><div class='no'>"+esc(p.location||"위치 미정")+"</div>"+(p.locationNote?"<div class='note'>"+esc(p.locationNote)+"</div>":"")+"</div><svg class='pin' viewBox='0 0 24 24' fill='currentColor'><path d='M12 2C8.1 2 5 5.1 5 9c0 5.2 7 13 7 13s7-7.8 7-13c0-3.9-3.1-7-7-7zm0 9.5A2.5 2.5 0 1 1 12 6.5a2.5 2.5 0 0 1 0 5z'/></svg></div>";
  h+="<div class='specs'><div class='spec'><div class='k'>사용량</div><div class='v'>"+esc(p.usage||"-")+"</div></div><div class='spec'><div class='k'>경화·건조</div><div class='v'>"+esc(p.curing||"-")+"</div></div></div>";
  var info=[];
  if(p.spec)info.push("<div>규격 <b>"+esc(p.spec)+"</b></div>");
  if(p.packaging)info.push("<div>포장 <b>"+esc(p.packaging)+"</b></div>");
  if(p.color&&p.color!=="-")info.push("<div>외관 <b>"+esc(p.color)+"</b></div>");
  if(info.length)h+="<div class='info'>"+info.join("")+"</div>";
  if(p.catalog){h+="<button class='pdf-btn' id='catBtn'><svg viewBox='0 0 24 24' fill='none' stroke='currentColor' stroke-width='2' stroke-linecap='round' stroke-linejoin='round'><path d='M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z'/><path d='M14 2v6h6'/></svg>제품 안내서(PDF) 보기<span class='arw'>→</span></button>";}
  if(p.desc){h+="<div class='sec'><h3>제품 설명</h3><p class='desc-p'>"+esc(p.desc)+"</p></div>";}
  if(p.uses){h+="<div class='sec'><h3>용도</h3><div class='uses-box'>"+esc(p.uses)+"</div></div>";}
  if(p.methods&&p.methods.length){
    h+="<div class='sec'><h3>시공법</h3>";
    p.methods.forEach(function(m,i){
      h+="<details class='method'"+(i===0?" open":"")+"><summary>"+esc(m.title)+"<span class='arw'>▸</span></summary><ol>";
      m.steps.forEach(function(s){h+="<li>"+esc(s)+"</li>";});
      h+="</ol></details>";
    });
    h+="</div>";
  }
  if(p.cautions&&p.cautions.length){h+="<div class='sec'><h3>주의사항</h3><ul class='cautions'>";p.cautions.forEach(function(c){h+="<li>"+esc(c)+"</li>";});h+="</ul></div>";}
  detailBody.innerHTML=h;detailBody.parentNode.scrollTop=0;
  overlay.classList.add("open");document.body.style.overflow="hidden";
  if(typeof toTop!=='undefined'&&toTop)toTop.classList.remove("show");
  if(typeof toTopDetail!=='undefined'&&toTopDetail)toTopDetail.classList.remove("show");
  var cb=document.getElementById("catBtn");if(cb)cb.onclick=openCatalog;
  document.getElementById("close").focus();
}
function closeDetail(){overlay.classList.remove("open");document.body.style.overflow="";if(lastFocused)lastFocused.focus();if(typeof toTopDetail!=='undefined'&&toTopDetail)toTopDetail.classList.remove("show");if(typeof toTop!=='undefined'&&toTop)toTop.classList.toggle("show",window.scrollY>300);}
document.getElementById("close").onclick=closeDetail;
overlay.onclick=function(e){if(e.target===overlay)closeDetail();};

var viewer=document.getElementById("viewer"),viewerFrame=document.getElementById("viewerFrame");
function openCatalog(){if(!currentCatalog)return;viewerFrame.src=currentCatalog;viewer.classList.add("open");}
function closeCatalog(){viewer.classList.remove("open");viewerFrame.src="";}
document.getElementById("viewerClose").onclick=closeCatalog;
document.addEventListener("keydown",function(e){if(e.key!=="Escape")return;if(viewer.classList.contains("open"))closeCatalog();else closeDetail();});

var box=document.getElementById("searchBox");
input.addEventListener("input",function(e){query=e.target.value;box.classList.toggle("has-value",query.length>0);render();});
document.getElementById("clear").onclick=function(){query="";input.value="";box.classList.remove("has-value");input.focus();render();};
var toTop=document.getElementById("toTop"),toTopDetail=document.getElementById("toTopDetail"),detailScroll=document.getElementById("detail");
window.addEventListener("scroll",function(){if(!overlay.classList.contains("open"))toTop.classList.toggle("show",window.scrollY>300);});
toTop.onclick=function(){window.scrollTo({top:0,behavior:"smooth"});};
detailScroll.addEventListener("scroll",function(){toTopDetail.classList.toggle("show",detailScroll.scrollTop>300);});
toTopDetail.onclick=function(){detailScroll.scrollTo({top:0,behavior:"smooth"});};
render();
</script>
</body>
